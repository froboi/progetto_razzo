<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Sensor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --temp-color: #ff6384;
            --hum-color: #36a2eb;
            --gas-color: #ffce56;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .upload-section {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        input[type="file"] {
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        /* Griglia per le statistiche (Medie, Max, Min) */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stat-card h3 { margin-top: 0; font-size: 1.2rem; }
        .stat-card .value { font-size: 1.8rem; font-weight: bold; margin: 10px 0; }
        .stat-card .details { font-size: 0.9rem; color: #7f8c8d; }
        
        .temp-card h3 { color: var(--temp-color); }
        .hum-card h3 { color: var(--hum-color); }
        .gas-card h3 { color: #d35400; }

        /* Griglia per i grafici */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }
        .chart-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative;
            height: 300px;
        }
    </style>
</head>
<body>

    <h1>📊 ESP32 Dashboard Sensori</h1>

    <div class="upload-section">
        <p>Seleziona il file <b>speriamo_che_funziona.json</b> dalla tua scheda SD:</p>
        <input type="file" id="fileInput" accept=".json, .txt">
    </div>

    <div id="dashboardArea" style="display: none;">
        
        <div class="stats-grid">
            <div class="stat-card temp-card">
                <h3>Temperatura</h3>
                <div class="value" id="avgTemp">-- °C</div>
                <div class="details">Max: <span id="maxTemp">--</span> | Min: <span id="minTemp">--</span></div>
            </div>
            <div class="stat-card hum-card">
                <h3>Umidità</h3>
                <div class="value" id="avgHum">-- %</div>
                <div class="details">Max: <span id="maxHum">--</span> | Min: <span id="minHum">--</span></div>
            </div>
            <div class="stat-card gas-card">
                <h3>Gas/Aria (MQ135)</h3>
                <div class="value" id="avgGas">--</div>
                <div class="details">Max: <span id="maxGas">--</span> | Min: <span id="minGas">--</span></div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-container"><canvas id="tempChart"></canvas></div>
            <div class="chart-container"><canvas id="humChart"></canvas></div>
            <div class="chart-container"><canvas id="gasChart"></canvas></div>
        </div>

    </div>

    <script>
        // Variabili globali per i grafici (per poterli distruggere e ricreare se carichi un nuovo file)
        let chartT, chartH, chartG;

        document.getElementById('fileInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                let content = e.target.result;
                
                // --- MAGIA: Pulizia del file generato dall'ESP32 ---
                // 1. Rimuove la riga di commento iniziale
                content = content.replace("// Inizio registrazione dati", "").trim();
                // 2. Rimuove l'ultima virgola se il file si interrompe così
                if (content.endsWith(",")) {
                    content = content.slice(0, -1);
                }
                // 3. Avvolge tutto in parentesi quadre per renderlo un Array JSON valido
                let jsonString = "[" + content + "]";

                try {
                    const data = JSON.parse(jsonString);
                    processData(data);
                    document.getElementById('dashboardArea').style.display = 'block';
                } catch (err) {
                    alert("Errore nella lettura del file JSON! Assicurati che sia formattato correttamente.");
                    console.error("Dettaglio errore:", err);
                }
            };
            reader.readAsText(file);
        });

        function processData(data) {
            let labels = [];
            let temps = [];
            let hums = [];
            let gases = [];

            // Estrazione dati
            data.forEach((entry, index) => {
                // Generiamo un asse X basato sul numero della lettura (e sapendo che sono ogni 2 sec)
                labels.push(`+${(index * 2)}s`); 
                temps.push(entry.sensor_DHT11["temperature_C"]);
                hums.push(entry.sensor_DHT11["humidity_%"]);
                gases.push(entry.sensor_MQ135["rawValue"]);
            });

            // Calcolo Statistiche
            calculateStats(temps, 'Temp', ' °C');
            calculateStats(hums, 'Hum', ' %');
            calculateStats(gases, 'Gas', '');

            // Generazione Grafici
            drawCharts(labels, temps, hums, gases);
        }

        function calculateStats(array, elementId, unit) {
            if (array.length === 0) return;
            let sum = array.reduce((a, b) => a + b, 0);
            let avg = (sum / array.length).toFixed(1);
            let max = Math.max(...array).toFixed(1);
            let min = Math.min(...array).toFixed(1);

            document.getElementById(`avg${elementId}`).innerText = avg + unit;
            document.getElementById(`max${elementId}`).innerText = max + unit;
            document.getElementById(`min${elementId}`).innerText = min + unit;
        }

        function drawCharts(labels, temps, hums, gases) {
            // Se esistono già grafici precedenti, li eliminiamo per fare spazio ai nuovi
            if(chartT) chartT.destroy();
            if(chartH) chartH.destroy();
            if(chartG) chartG.destroy();

            // Configurazione Grafico Temperatura
            const ctxTemp = document.getElementById('tempChart').getContext('2d');
            chartT = new Chart(ctxTemp, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Temperatura (°C)',
                        data: temps,
                        borderColor: '#ff6384',
                        backgroundColor: 'rgba(255, 99, 132, 0.2)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: { maintainAspectRatio: false }
            });

            // Configurazione Grafico Umidità
            const ctxHum = document.getElementById('humChart').getContext('2d');
            chartH = new Chart(ctxHum, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Umidità (%)',
                        data: hums,
                        borderColor: '#36a2eb',
                        backgroundColor: 'rgba(54, 162, 235, 0.2)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: { maintainAspectRatio: false }
            });

            // Configurazione Grafico MQ135
            const ctxGas = document.getElementById('gasChart').getContext('2d');
            chartG = new Chart(ctxGas, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Valore RAW MQ135 (Aria)',
                        data: gases,
                        borderColor: '#d35400',
                        backgroundColor: 'rgba(211, 84, 0, 0.2)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: { maintainAspectRatio: false }
            });
        }
    </script>
</body>
</html>
